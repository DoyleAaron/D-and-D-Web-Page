  <title>Dayner Map - AI Understanding Visualization</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
    }
    .header {
      background: #0f0f1a;
      padding: 15px 20px;
      border-bottom: 1px solid #333;
    }
    h1 { font-size: 1.3rem; color: #d4af37; margin-bottom: 10px; }
    .legend {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      font-size: 0.8rem;
    }
    .legend-group { display: flex; gap: 10px; align-items: center; }
    .legend-group h3 { color: #888; font-size: 0.75rem; margin-right: 5px; }
    .legend-item { display: flex; align-items: center; gap: 4px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
    .legend-line { width: 20px; height: 3px; }
    
    .map-container {
      position: relative;
      width: 100%;
      height: calc(100vh - 120px);
      overflow: auto;
      background: #0a0a15;
    }
    .map-wrapper {
      position: relative;
      display: inline-block;
    }
    .map-wrapper img {
      display: block;
      max-width: none;
      width: 1600px;
    }
    
    /* SVG overlay */
    .map-svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    
    /* Settlement markers */
    .settlement {
      position: absolute;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      border: 2px solid white;
      cursor: pointer;
      z-index: 20;
    }
    .settlement:hover {
      transform: translate(-50%, -50%) scale(1.5);
      z-index: 100;
    }
    .settlement.capital { width: 16px; height: 16px; }
    .settlement.large-city { width: 12px; height: 12px; }
    .settlement.medium-city { width: 10px; height: 10px; }
    .settlement.town { width: 8px; height: 8px; }
    .settlement.village { width: 6px; height: 6px; }
    .settlement.poi { width: 8px; height: 8px; border-style: dashed; }
    
    /* Kingdom colors */
    .settlement.braewood { background: #e94560; }
    .settlement.islefield { background: #4caf50; }
    .settlement.kluimont { background: #9c27b0; }
    .settlement.lavalto { background: #ff5722; }
    
    /* Tooltip */
    .tooltip {
      position: fixed;
      background: rgba(0,0,0,0.9);
      padding: 10px 15px;
      border-radius: 6px;
      font-size: 0.85rem;
      z-index: 1000;
      pointer-events: none;
      max-width: 300px;
      border: 1px solid #444;
    }
    .tooltip h4 { color: #d4af37; margin-bottom: 5px; }
    .tooltip .type { color: #888; font-size: 0.75rem; }
    .tooltip .location { color: #4caf50; font-size: 0.75rem; margin-top: 5px; }
    
    /* Controls */
    .controls {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(0,0,0,0.8);
      padding: 15px;
      border-radius: 8px;
      z-index: 50;
    }
    .controls label {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .controls input[type="checkbox"] {
      width: 16px;
      height: 16px;
    }
    
    /* Info panel */
    .info-panel {
      position: fixed;
      top: 80px;
      right: 20px;
      background: rgba(0,0,0,0.9);
      padding: 15px;
      border-radius: 8px;
      z-index: 50;
      max-width: 350px;
      max-height: calc(100vh - 200px);
      overflow-y: auto;
      border: 1px solid #333;
    }
    .info-panel h3 { color: #d4af37; margin-bottom: 10px; }
    .info-section { margin-bottom: 15px; }
    .info-section h4 { color: #888; font-size: 0.8rem; margin-bottom: 5px; }
    .info-section ul { list-style: none; font-size: 0.8rem; }
    .info-section li { padding: 3px 0; border-bottom: 1px solid #222; }
    .info-section .kingdom { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; }
  </style>
</head>

        { name: 'Sable', type: 'village', x: 39.3, y: 44.7, pop: 590 }
      ],
      kluimont: [
        { name: 'Kluimont City', type: 'capital', x: 10.7, y: 12.9, pop: 180000 },
        { name: 'Eimgend (Kluimont)', type: 'large-city', x: 28.2, y: 35.4, pop: 75000 },
        { name: 'Qrey', type: 'medium-city', x: 7.8, y: 7, pop: 12000 },
        { name: 'Slonmore', type: 'medium-city', x: 50.9, y: 27.1, pop: 15000 },
        { name: 'Sord', type: 'town', x: 45.3, y: 31.5, pop: 3200 },
        { name: 'Tarora', type: 'town', x: 18.5, y: 24.7, pop: 2800 },
        { name: 'Lloy (Destroyed)', type: 'village', x: 20.1, y: 10.1, pop: 0 },
        { name: 'Aresphia', type: 'village', x: 9.2, y: 27.9, pop: 450 },
        { name: 'Kilson', type: 'village', x: 11, y: 29.5, pop: 520 },
        { name: 'Yuosburn', type: 'village', x: 29.8, y: 14.4, pop: 680 },
        { name: 'Ukrolis', type: 'village', x: 37.4, y: 13.6, pop: 590 },
        { name: 'Ajag', type: 'village', x: 39.8, y: 26.9, pop: 420 },
        { name: 'Ansdale', type: 'village', x: 47.9, y: 40.8, pop: 550 },
        { name: 'Klovine', type: 'village', x: 36.2, y: 38.7, pop: 480 }
      ],
      lavalto: [
        { name: 'Lavalto (Vampire Isle)', type: 'capital', x: 55.7, y: 58.6, pop: 50000 }
      ]
    };
    
    // ========================================
    // RENDERING
    // ========================================
    const svg = document.getElementById('map-svg');
    const mapWrapper = document.getElementById('map-wrapper');
    const tooltip = document.getElementById('tooltip');
    
    // Draw path from points
    function drawPath(points, className, close = true) {
      if (points.length < 2) return;
      const pathData = points.map((p, i) => 
        `${i === 0 ? 'M' : 'L'} ${p.x}% ${p.y}%`
      ).join(' ') + (close ? ' Z' : '');
      
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', pathData);
      path.setAttribute('class', className);
      path.setAttribute('vector-effect', 'non-scaling-stroke');
      svg.appendChild(path);
      return path;
    }
    
    // Draw all geography
    function drawGeography() {
      svg.innerHTML = `
        <style>
          .border { fill: none; stroke-width: 2; opacity: 0.7; }
          .border.braewood { stroke: #e94560; }
          .border.islefield { stroke: #4caf50; }
          .border.kluimont { stroke: #9c27b0; }
          .border.lavalto { stroke: #ff5722; }
          .lake { fill: rgba(65, 105, 225, 0.3); stroke: #4169e1; stroke-width: 2; }
          .lake-inner { fill: none; stroke: #4169e1; stroke-width: 2; stroke-dasharray: 5,3; }
          .island { fill: rgba(139, 69, 19, 0.2); stroke: #8b4513; stroke-width: 2; }
          .river { fill: none; stroke: #1e90ff; stroke-width: 3; opacity: 0.8; }
          .bridge-marker { fill: #ffd700; stroke: white; stroke-width: 2; }
        </style>
      `;
      
      // Kingdom borders
      if (document.getElementById('show-borders').checked) {
        drawPath(COORDINATES.braewood, 'border braewood');
        drawPath(COORDINATES.islefield, 'border islefield');
        drawPath(COORDINATES.lavalto, 'border lavalto');
      }
      
      // Lakes (Lavalto ring lake)
      if (document.getElementById('show-lakes').checked) {
        drawPath(COORDINATES.lake_outer, 'lake');
        drawPath(COORDINATES.lake_inner, 'lake-inner');
      }
      
      // Islands (Rimduff Isles)
      if (document.getElementById('show-islands').checked) {
        drawPath(COORDINATES.islands, 'island');
      }
      
      // Bridges
      if (document.getElementById('show-bridges').checked) {
        COORDINATES.bridges.forEach(b => {
          const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          circle.setAttribute('cx', b.x + '%');
          circle.setAttribute('cy', b.y + '%');
          circle.setAttribute('r', '8');
          circle.setAttribute('class', 'bridge-marker');
          svg.appendChild(circle);
        });
      }
    }
    
    // Draw settlements
    function drawSettlements() {
      document.querySelectorAll('.settlement').forEach(s => s.remove());
      
      if (!document.getElementById('show-settlements').checked) return;
      
      for (const [kingdom, settlements] of Object.entries(SETTLEMENTS)) {
        settlements.forEach(s => {
          const marker = document.createElement('div');
          marker.className = `settlement ${s.type} ${kingdom}`;
          marker.style.left = s.x + '%';
          marker.style.top = s.y + '%';
          marker.dataset.name = s.name;
          marker.dataset.type = s.type;
          marker.dataset.kingdom = kingdom;
          marker.dataset.pop = s.pop;
          
          marker.addEventListener('mouseenter', showTooltip);
          marker.addEventListener('mouseleave', hideTooltip);
          
          mapWrapper.appendChild(marker);
        });
      }
    }
    
    function showTooltip(e) {
      const s = e.target;
      const location = getLocationDescription(parseFloat(s.style.left), parseFloat(s.style.top));
      tooltip.innerHTML = `
        <h4>${s.dataset.name}</h4>
        <div class="type">${s.dataset.type.replace('-', ' ')} in ${s.dataset.kingdom}</div>
        <div>Pop: ${parseInt(s.dataset.pop).toLocaleString()}</div>
        ${location ? `<div class="location">📍 ${location}</div>` : ''}
      `;
      tooltip.style.display = 'block';
      tooltip.style.left = (e.clientX + 15) + 'px';
      tooltip.style.top = (e.clientY + 15) + 'px';
    }
    
    function hideTooltip() {
      tooltip.style.display = 'none';
    }
    
    // Determine if settlement is near water features
    function getLocationDescription(x, y) {
      const features = [];
      
      // Near Lavalto Lake (between outer and inner rings)
      const distToLakeCenter = Math.sqrt((x - 55.7) ** 2 + (y - 58.6) ** 2);
      if (distToLakeCenter < 20 && distToLakeCenter > 5) {
        features.push('On Lavalto Lake shore');
      }
      
      // On Rimduff Isles
      if (x < 25 && y < 25) {
        features.push('Rimduff Isles');
      }
      
      // Near bridges
      COORDINATES.bridges.forEach(b => {
        const dist = Math.sqrt((x - b.x) ** 2 + (y - b.y) ** 2);
        if (dist < 5) {
          features.push(`Near ${b.name}`);
        }
      });
      
      return features.join(', ');
    }
    
    // Analyze water-adjacent settlements
    function analyzeSettlements() {
      const lavaltoList = document.getElementById('lavalto-lake-list');
      const riverList = document.getElementById('river-list');
      const islandList = document.getElementById('island-list');
      const bridgeList = document.getElementById('bridge-list');
      
      // Clear lists
      lavaltoList.innerHTML = '';
      riverList.innerHTML = '';
      islandList.innerHTML = '';
      bridgeList.innerHTML = '';
      
      for (const [kingdom, settlements] of Object.entries(SETTLEMENTS)) {
        settlements.forEach(s => {
          const colors = {
            braewood: '#e94560',
            islefield: '#4caf50',
            kluimont: '#9c27b0',
            lavalto: '#ff5722'
          };
          
          // Check Lavalto Lake proximity
          const distToLakeCenter = Math.sqrt((s.x - 55.7) ** 2 + (s.y - 58.6) ** 2);
          if (distToLakeCenter < 18 && distToLakeCenter > 3) {
            lavaltoList.innerHTML += `<li><span class="kingdom" style="background:${colors[kingdom]}"></span>${s.name}</li>`;
          }
          
          // Check Rimduff Isles
          if (s.x < 22 && s.y < 25) {
            islandList.innerHTML += `<li><span class="kingdom" style="background:${colors[kingdom]}"></span>${s.name}</li>`;
          }
          
          // Check bridge proximity
          COORDINATES.bridges.forEach(b => {
            const dist = Math.sqrt((s.x - b.x) ** 2 + (s.y - b.y) ** 2);
            if (dist < 6) {
              bridgeList.innerHTML += `<li><span class="kingdom" style="background:${colors[kingdom]}"></span>${s.name} (${b.name.split(' ')[0]})</li>`;
            }
          });
        });
      }
      
      // Add placeholder if empty
      if (!lavaltoList.innerHTML) lavaltoList.innerHTML = '<li style="color:#666">None detected</li>';
      if (!islandList.innerHTML) islandList.innerHTML = '<li style="color:#666">None detected</li>';
      if (!bridgeList.innerHTML) bridgeList.innerHTML = '<li style="color:#666">None detected</li>';
      
      // River settlements (estimated based on major river paths)
      riverList.innerHTML = `
        <li><span class="kingdom" style="background:#4caf50"></span>Islefield City (River mouth)</li>
        <li><span class="kingdom" style="background:#4caf50"></span>Slido (River crossing)</li>
        <li><span class="kingdom" style="background:#4caf50"></span>Beyross (River mouth)</li>
        <li><span class="kingdom" style="background:#e94560"></span>Kadena (Grand Span)</li>
        <li><span class="kingdom" style="background:#e94560"></span>Phine (River crossing)</li>
        <li><span class="kingdom" style="background:#9c27b0"></span>Eimgend (River confluence)</li>
      `;
    }
    
    // Initialize
    function init() {
      drawGeography();
      drawSettlements();
      analyzeSettlements();
      
      // Toggle handlers
      document.querySelectorAll('.controls input').forEach(input => {
        input.addEventListener('change', () => {
          drawGeography();
          drawSettlements();
        });
      });
    }
    
    // Wait for image to load
    document.getElementById('map-image').onload = init;
    if (document.getElementById('map-image').complete) init();
  </script>
</body>
</html>
