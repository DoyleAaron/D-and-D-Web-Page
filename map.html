<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <meta name="description" content="Interactive Map of Dayner - Explore the Kingdoms">
  <meta name="theme-color" content="#1a1a2e">
  <title>World Map - Dayner</title>
  
  <!-- CSS Files -->
  <link rel="stylesheet" href="static/css/variables.css">
  <link rel="stylesheet" href="static/css/base.css">
  <link rel="stylesheet" href="static/css/components.css">
  <link rel="stylesheet" href="static/css/map.css">
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #0a0a15;
    }
    
    .map-page {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    .map-view {
      display: flex;
      flex: 1;
      position: relative;
    }
    
    /* Ensure map fills space */
    .map-container {
      flex: 1;
      position: relative;
    }
    
    /* Mobile settlement list toggle */
    .mobile-list-toggle {
      display: none;
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 24px;
      background: linear-gradient(135deg, var(--accent-gold) 0%, #b8962d 100%);
      border: none;
      border-radius: 25px;
      color: #1a1a2e;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      z-index: 150;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    }
    
    @media (max-width: 768px) {
      .mobile-list-toggle {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      
      .settlement-list-container {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: var(--bg-secondary);
        border-radius: 16px 16px 0 0;
        max-height: 50vh;
        transform: translateY(100%);
        transition: transform 0.3s ease;
        z-index: 160;
        overflow: hidden;
      }
      
      .settlement-list-container.open {
        transform: translateY(0);
      }
      
      .settlement-list-header {
        padding: 15px 20px;
        border-bottom: 1px solid var(--border-color);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      
      .settlement-list-close {
        background: none;
        border: none;
        color: var(--text-muted);
        font-size: 20px;
        cursor: pointer;
      }
      
      .settlement-list {
        display: flex !important;
      }
    }
    
    /* Travel Mode Toggle */
    .travel-mode-toggle {
      display: flex;
      gap: 8px;
    }
    
    .mode-toggle-btn {
      flex: 1;
      padding: 10px 16px;
      border: 2px solid var(--border-color);
      background: var(--bg-secondary);
      color: var(--text-muted);
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      pointer-events: auto;
      position: relative;
      z-index: 10;
    }
    
    .mode-toggle-btn:hover {
      border-color: var(--accent-gold);
      color: var(--accent-gold);
    }
    
    .mode-toggle-btn.active[data-mode="road"] {
      background: linear-gradient(135deg, #8B4513 0%, #654321 100%);
      border-color: #8B4513;
      color: white;
    }
    
    .mode-toggle-btn.active[data-mode="sea"] {
      background: linear-gradient(135deg, #1e90ff 0%, #0066cc 100%);
      border-color: #1e90ff;
      color: white;
    }
    
    /* Sea travel result styling */
    .result-header.sea {
      color: #1e90ff;
    }
    
    .result-highlight.sea {
      background: linear-gradient(135deg, rgba(30, 144, 255, 0.2) 0%, rgba(0, 102, 204, 0.2) 100%);
      border-color: #1e90ff;
    }
    
    .path-header.sea {
      color: #1e90ff;
    }
    
    .path-step.sea .step-num {
      background: #1e90ff;
    }
    
    .path-arrow.sea {
      color: #1e90ff;
    }
  </style>
</head>
<body>
  <div class="map-page">
    <!-- Page Header -->
    <header class="map-page-header">
      <div class="header-left">
        <a href="index.html" class="back-btn" title="Back to Home">
          <i class="fas fa-arrow-left"></i>
        </a>
        <div class="header-title">
          <i class="fas fa-map-marked-alt"></i>
          <span>World of Dayner</span>
        </div>
      </div>
      <button class="mobile-menu-btn" id="mobile-menu-fab">
        <i class="fas fa-layer-group"></i>
      </button>
    </header>

    <!-- Main Map View -->
    <div class="map-view active">
      <!-- Map Header with Region Tabs -->
      <div class="map-header">
        <h1 class="map-title"><i class="fas fa-map-marked-alt"></i> World of Dayner</h1>
        <div class="region-tabs">
          <button class="region-tab active" data-kingdom="all">
            <i class="fas fa-globe"></i> All Kingdoms
          </button>
          <button class="region-tab" data-kingdom="braewood">
            <i class="fas fa-shield-alt"></i> Braewood
          </button>
          <button class="region-tab" data-kingdom="islefield">
            <i class="fas fa-leaf"></i> Islefield
          </button>
          <button class="region-tab" data-kingdom="kluimont">
            <i class="fas fa-hat-wizard"></i> Kluimont
          </button>
          <button class="region-tab" data-kingdom="lavalto">
            <i class="fas fa-fire"></i> Lavalto
          </button>
        </div>
      </div>

      <!-- Map Controls -->
      <div class="map-controls">
        <button class="map-control-btn" id="map-zoom-in" title="Zoom In">
          <i class="fas fa-plus"></i>
        </button>
        <button class="map-control-btn" id="map-zoom-out" title="Zoom Out">
          <i class="fas fa-minus"></i>
        </button>
        <button class="map-control-btn" id="map-home" title="Home">
          <i class="fa-solid fa-house"></i>
        </button>
        <div class="zoom-level" id="zoom-level">100%</div>
        <button class="map-control-btn" id="map-zoom-reset" title="Reset View">
          <i class="fas fa-compress-arrows-alt"></i>
        </button>
      </div>

      <!-- Map Container -->
      <div class="map-container" id="map-container">
        <div class="map-wrapper" id="map-wrapper">
          <img src="map.jpg" alt="Map of Dayner" class="map-image" id="map-image" draggable="false">
          <!-- Settlement markers will be rendered here by JavaScript -->
        </div>
      </div>

      <!-- Legend -->
      <div class="map-legend">
        <div class="legend-title">Settlement Types</div>
        <div class="legend-item">
          <div class="legend-dot capital"></div>
          <span>Capital</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot large-city"></div>
          <span>Large City</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot medium-city"></div>
          <span>Medium City</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot town"></div>
          <span>Town</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot village"></div>
          <span>Village</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot poi"></div>
          <span>Point of Interest</span>
        </div>
      </div>
      
      <!-- Travel Calculator -->
      <div class="travel-calculator" id="travel-calculator">
        <div class="calc-header">
          <div class="calc-drag-handle">
            <span class="drag-bar"></span>
          </div>
          <i class="fas fa-route"></i>
          <span>Travel Calculator</span>
          <button class="calc-close" id="calc-close">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div class="calc-body" id="calc-body">
          <div class="calc-field">
            <label>Travel Mode</label>
            <div class="travel-mode-toggle">
              <button type="button" class="mode-toggle-btn active" data-mode="road">
                <i class="fas fa-road"></i> Road
              </button>
              <button type="button" class="mode-toggle-btn" data-mode="sea">
                <i class="fas fa-ship"></i> Sea
              </button>
            </div>
          </div>
          <div class="calc-stops" id="calc-stops">
            <div class="calc-field stop-field" data-stop="0">
              <label>From</label>
              <div class="searchable-select">
                <input type="text" class="searchable-input" id="search-from" placeholder="Type to search..." autocomplete="off">
                <div class="searchable-dropdown" id="dropdown-from"></div>
                <input type="hidden" id="travel-from" class="travel-stop">
              </div>
            </div>
            <div class="calc-field stop-field" data-stop="1">
              <label>To</label>
              <div class="stop-row">
                <div class="searchable-select">
                  <input type="text" class="searchable-input" id="search-to" placeholder="Type to search..." autocomplete="off">
                  <div class="searchable-dropdown" id="dropdown-to"></div>
                  <input type="hidden" id="travel-to" class="travel-stop">
                </div>
                <button type="button" class="add-stop-btn" id="add-stop-btn" title="Add stop">+</button>
              </div>
            </div>
          </div>
          <div class="calc-field" id="road-pace-field">
            <label>Travel Pace (Road)</label>
            <select id="road-pace" class="calc-select">
              <option value="slow">Slow (20 mi/day) - Stealth possible</option>
              <option value="normal" selected>Normal (30 mi/day)</option>
              <option value="fast">Fast (40 mi/day) - -5 Perception</option>
            </select>
          </div>
          <div class="calc-field" id="sea-pace-field" style="display: none;">
            <label>Sailing Speed</label>
            <select id="sea-pace" class="calc-select">
              <option value="slow">Slow (24 mi/day) - Careful/Bad Weather</option>
              <option value="normal" selected>Normal (48 mi/day)</option>
              <option value="fast">Fast (72 mi/day) - Full Sail</option>
            </select>
          </div>
          <button type="button" class="calc-btn" id="calculate-travel">
            <i class="fas fa-route"></i>
            <span>Calculate Route</span>
          </button>
          <div class="calc-result" id="calc-result"></div>
          <div class="calc-path" id="calc-path"></div>
        </div>
      </div>

      <!-- Settlement Info Panel -->
      <div class="settlement-panel" id="settlement-panel">
        <div class="panel-header">
          <button class="panel-close" onclick="MapModule.closePanel()">
            <i class="fas fa-times"></i>
          </button>
          <h2 class="panel-title">Settlement Name</h2>
          <div class="panel-subtitle">
            <span class="panel-type-badge">Type</span>
            <span>Kingdom</span>
          </div>
        </div>
        <div class="panel-content">
          <!-- Content populated by JavaScript -->
        </div>
        <div class="panel-footer">
          <button class="panel-link">
            <i class="fas fa-book-open"></i>
            View Full Details
          </button>
        </div>
      </div>
    </div>

    <!-- Mobile Map Menu -->
    <div class="mobile-map-menu-overlay" id="mobile-map-menu-overlay"></div>
    <div class="mobile-map-menu" id="mobile-map-menu">
      <div class="menu-header">
        <span>Map Tools</span>
        <button class="menu-close" id="menu-close">&times;</button>
      </div>
      <div class="menu-grid">
        <button class="menu-item" id="menu-zoom-in"><i class="fas fa-plus"></i> Zoom In</button>
        <button class="menu-item" id="menu-zoom-out"><i class="fas fa-minus"></i> Zoom Out</button>
        <button class="menu-item" id="menu-reset"><i class="fas fa-home"></i> Reset</button>
        <button class="menu-item" id="menu-fullscreen"><i class="fas fa-expand"></i> Fullscreen</button>
      </div>
      <div class="menu-list">
        <button class="menu-row" id="menu-travel-calc">
          <i class="fas fa-route"></i> 
          <span>Travel Calculator</span>
          <i class="fas fa-chevron-right"></i>
        </button>
        <button class="menu-row" id="menu-settlements">
          <i class="fas fa-list"></i> 
          <span>View Settlements</span>
          <i class="fas fa-chevron-right"></i>
        </button>
        <button class="menu-row" id="menu-legend">
          <i class="fas fa-map"></i> 
          <span>Legend</span>
          <i class="fas fa-chevron-right"></i>
        </button>
      </div>
    </div>

    <!-- Mobile Legend -->
    <div class="mobile-legend-container" id="mobile-legend-container">
      <div class="mobile-legend-header">
        <i class="fas fa-map"></i>
        <span>Map Legend</span>
        <button class="mobile-legend-close" id="mobile-legend-close">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <div class="mobile-legend-content">
        <div class="legend-section">
          <div class="legend-subtitle">Settlements</div>
          <div class="legend-item">
            <div class="legend-dot capital"></div>
            <span>Capital</span>
          </div>
          <div class="legend-item">
            <div class="legend-dot large-city"></div>
            <span>Large City</span>
          </div>
          <div class="legend-item">
            <div class="legend-dot medium-city"></div>
            <span>Medium City</span>
          </div>
          <div class="legend-item">
            <div class="legend-dot town"></div>
            <span>Town</span>
          </div>
          <div class="legend-item">
            <div class="legend-dot village"></div>
            <span>Village</span>
          </div>
          <div class="legend-item">
            <div class="legend-dot poi"></div>
            <span>Point of Interest</span>
          </div>
        </div>
        <div class="legend-section">
          <div class="legend-subtitle">Features</div>
          <div class="legend-item">
            <div class="legend-line road"></div>
            <span>Roads</span>
          </div>
          <div class="legend-item">
            <div class="legend-line river"></div>
            <span>Rivers</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Mobile Settlement List -->
    <div class="settlement-list-container" id="settlement-list-container">
      <div class="settlement-list-header">
        <i class="fas fa-list"></i>
        <span>Settlements</span>
        <button class="settlement-list-close" id="settlement-list-close">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <div class="settlement-list" id="settlement-list">
        <!-- List populated by JavaScript -->
      </div>
    </div>
  </div>

  <!-- Road Network for Travel Calculator -->
  <script src="road-data.js"></script>
  <script src="static/js/road-network.js"></script>
  
  <!-- Ship Routes for Sea Travel -->
  <script src="static/js/ship-routes.js"></script>
  
  <!-- Map JavaScript -->
  <script src="static/js/map.js"></script>
  
  <!-- Mobile List Toggle -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const toggle = document.getElementById('mobile-list-toggle');
      const container = document.getElementById('settlement-list-container');
      const closeBtn = document.getElementById('settlement-list-close');
      
      if (toggle && container) {
        toggle.addEventListener('click', () => {
          container.classList.add('open');
        });
      }
      
      if (closeBtn && container) {
        closeBtn.addEventListener('click', () => {
          container.classList.remove('open');
        });
      }
    });
  </script>
</body>
</html>
