<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kingdom Border Mapping Tool</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
    }
    .header {
      background: #0f0f1a;
      padding: 15px 20px;
      border-bottom: 1px solid #333;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }
    h1 {
      font-size: 1.2rem;
      color: #d4af37;
    }
    .instructions {
      font-size: 0.85rem;
      color: #aaa;
      max-width: 500px;
    }
    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    button {
      background: #e94560;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover { background: #c73a52; }
    button.secondary {
      background: #333;
    }
    button.secondary:hover { background: #444; }
    select {
      background: #333;
      color: white;
      border: 1px solid #555;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 14px;
    }
    
    .main {
      display: flex;
      height: calc(100vh - 70px);
    }
    
    .map-area {
      flex: 1;
      overflow: auto;
      position: relative;
      background: #0a0a15;
    }
    
    .map-container {
      position: relative;
      display: inline-block;
    }
    
    .map-container img {
      display: block;
      max-width: none;
    }
    
    /* Border points */
    .border-point {
      position: absolute;
      width: 12px;
      height: 12px;
      border: 2px solid white;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      cursor: pointer;
      z-index: 20;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }
    .border-point:hover {
      transform: translate(-50%, -50%) scale(1.3);
    }
    .border-point.braewood { background: #e94560; }
    .border-point.islefield { background: #4caf50; }
    .border-point.kluimont { background: #9c27b0; }
    .border-point.lavalto { background: #ff5722; }
    .border-point.bridge { background: #ffd700; }
    
    /* SVG overlay for lines */
    .border-svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }
    
    .border-line {
      fill: none;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .border-line.braewood { stroke: #e94560; }
    .border-line.islefield { stroke: #4caf50; }
    .border-line.kluimont { stroke: #9c27b0; }
    .border-line.lavalto { stroke: #ff5722; }
    .border-line.bridge { stroke: #ffd700; stroke-dasharray: 10, 5; }
    
    /* Sidebar */
    .sidebar {
      width: 350px;
      background: #16162a;
      border-left: 1px solid #333;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-header {
      padding: 15px;
      background: #0f0f1a;
      border-bottom: 1px solid #333;
    }
    .sidebar-content {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
    }
    
    .kingdom-section {
      margin-bottom: 20px;
      padding: 15px;
      background: #1e1e35;
      border-radius: 8px;
      border-left: 4px solid;
    }
    .kingdom-section.braewood { border-color: #e94560; }
    .kingdom-section.islefield { border-color: #4caf50; }
    .kingdom-section.kluimont { border-color: #9c27b0; }
    .kingdom-section.lavalto { border-color: #ff5722; }
    .kingdom-section.bridge { border-color: #ffd700; }
    
    .kingdom-title {
      font-weight: bold;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .point-count {
      font-size: 0.8rem;
      color: #888;
    }
    .point-list {
      font-family: monospace;
      font-size: 0.75rem;
      background: #0a0a15;
      padding: 10px;
      border-radius: 4px;
      max-height: 150px;
      overflow-y: auto;
      word-break: break-all;
    }
    
    .output-section {
      padding: 15px;
      background: #0f0f1a;
      border-top: 1px solid #333;
    }
    .output-section h3 {
      margin-bottom: 10px;
      color: #d4af37;
      font-size: 0.9rem;
    }
    #output {
      width: 100%;
      height: 200px;
      background: #0a0a15;
      color: #4caf50;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 10px;
      font-family: monospace;
      font-size: 0.75rem;
      resize: vertical;
    }
    
    .legend {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      margin-top: 10px;
      font-size: 0.8rem;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }
    .legend-dot.braewood { background: #e94560; }
    .legend-dot.islefield { background: #4caf50; }
    .legend-dot.kluimont { background: #9c27b0; }
    .legend-dot.lavalto { background: #ff5722; }
    .legend-dot.bridge { background: #ffd700; }
    
    .cursor-info {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: rgba(0,0,0,0.8);
      padding: 10px 15px;
      border-radius: 6px;
      font-family: monospace;
      z-index: 100;
    }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>🗺️ Kingdom Border Mapping Tool</h1>
      <p class="instructions">Click on the map to add border points. Points connect in order to form kingdom outlines. Use "Bridge" for bridge locations.</p>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot braewood"></div> Braewood</div>
        <div class="legend-item"><div class="legend-dot islefield"></div> Islefield</div>
        <div class="legend-item"><div class="legend-dot kluimont"></div> Kluimont</div>
        <div class="legend-item"><div class="legend-dot lavalto"></div> Lavalto</div>
        <div class="legend-item"><div class="legend-dot bridge"></div> Bridges</div>
      </div>
    </div>
    <div class="controls">
      <select id="kingdom-select">
        <option value="braewood">Braewood</option>
        <option value="islefield">Islefield</option>
        <option value="kluimont">Kluimont</option>
        <option value="lavalto">Lavalto</option>
        <option value="bridge">Bridges</option>
      </select>
      <button onclick="undoLast()">Undo Last</button>
      <button class="secondary" onclick="clearCurrent()">Clear Current</button>
      <button class="secondary" onclick="clearAll()">Clear All</button>
      <button onclick="copyOutput()">📋 Copy Output</button>
    </div>
  </div>
  
  <div class="main">
    <div class="map-area" id="map-area">
      <div class="map-container" id="map-container">
        <img src="map.jpg" id="map-image" alt="Map">
        <svg class="border-svg" id="border-svg"></svg>
      </div>
    </div>
    
    <div class="sidebar">
      <div class="sidebar-header">
        <h2 style="font-size: 1rem; color: #d4af37;">Border Points</h2>
      </div>
      <div class="sidebar-content" id="sidebar-content">
        <!-- Kingdom sections will be generated here -->
      </div>
      <div class="output-section">
        <h3>📋 Output for Copilot</h3>
        <textarea id="output" readonly placeholder="Border coordinates will appear here..."></textarea>
      </div>
    </div>
  </div>
  
  <div class="cursor-info" id="cursor-info">X: 0.0% | Y: 0.0%</div>

  <script>
    const borders = {
      braewood: [],
      islefield: [],
      kluimont: [],
      lavalto: [],
      bridge: []
    };
    
    const kingdomSelect = document.getElementById('kingdom-select');
    const mapContainer = document.getElementById('map-container');
    const mapImage = document.getElementById('map-image');
    const borderSvg = document.getElementById('border-svg');
    const cursorInfo = document.getElementById('cursor-info');
    const output = document.getElementById('output');
    
    // Track mouse position
    document.getElementById('map-area').addEventListener('mousemove', (e) => {
      const rect = mapImage.getBoundingClientRect();
      const x = ((e.clientX - rect.left) / rect.width * 100).toFixed(1);
      const y = ((e.clientY - rect.top) / rect.height * 100).toFixed(1);
      cursorInfo.textContent = `X: ${x}% | Y: ${y}%`;
    });
    
    // Add point on click
    mapContainer.addEventListener('click', (e) => {
      if (e.target.classList.contains('border-point')) return;
      
      const rect = mapImage.getBoundingClientRect();
      const x = ((e.clientX - rect.left) / rect.width * 100).toFixed(1);
      const y = ((e.clientY - rect.top) / rect.height * 100).toFixed(1);
      
      const kingdom = kingdomSelect.value;
      borders[kingdom].push({ x: parseFloat(x), y: parseFloat(y) });
      
      render();
    });
    
    function render() {
      // Clear existing points
      document.querySelectorAll('.border-point').forEach(p => p.remove());
      
      // Clear SVG
      borderSvg.innerHTML = '';
      
      // Render each kingdom
      for (const [kingdom, points] of Object.entries(borders)) {
        if (points.length === 0) continue;
        
        // Draw lines
        if (points.length > 1) {
          const pathData = points.map((p, i) => 
            `${i === 0 ? 'M' : 'L'} ${p.x}% ${p.y}%`
          ).join(' ');
          
          const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          path.setAttribute('d', pathData);
          path.setAttribute('class', `border-line ${kingdom}`);
          path.setAttribute('vector-effect', 'non-scaling-stroke');
          borderSvg.appendChild(path);
          
          // Close the path for kingdoms (not bridges)
          if (kingdom !== 'bridge' && points.length > 2) {
            const closePath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            closePath.setAttribute('d', `M ${points[points.length-1].x}% ${points[points.length-1].y}% L ${points[0].x}% ${points[0].y}%`);
            closePath.setAttribute('class', `border-line ${kingdom}`);
            closePath.setAttribute('opacity', '0.5');
            closePath.setAttribute('stroke-dasharray', '5,5');
            closePath.setAttribute('vector-effect', 'non-scaling-stroke');
            borderSvg.appendChild(closePath);
          }
        }
        
        // Draw points
        points.forEach((point, index) => {
          const dot = document.createElement('div');
          dot.className = `border-point ${kingdom}`;
          dot.style.left = point.x + '%';
          dot.style.top = point.y + '%';
          dot.title = `${kingdom} #${index + 1}: (${point.x}, ${point.y})`;
          dot.onclick = (e) => {
            e.stopPropagation();
            if (confirm(`Delete point #${index + 1} from ${kingdom}?`)) {
              borders[kingdom].splice(index, 1);
              render();
            }
          };
          mapContainer.appendChild(dot);
        });
      }
      
      updateSidebar();
      updateOutput();
    }
    
    function updateSidebar() {
      const sidebar = document.getElementById('sidebar-content');
      sidebar.innerHTML = '';
      
      for (const [kingdom, points] of Object.entries(borders)) {
        const section = document.createElement('div');
        section.className = `kingdom-section ${kingdom}`;
        section.innerHTML = `
          <div class="kingdom-title">
            <span>${kingdom.charAt(0).toUpperCase() + kingdom.slice(1)}</span>
            <span class="point-count">${points.length} points</span>
          </div>
          <div class="point-list">
            ${points.length === 0 ? '<em style="color:#666">No points yet</em>' : 
              points.map((p, i) => `#${i+1}: (${p.x}, ${p.y})`).join('<br>')}
          </div>
        `;
        sidebar.appendChild(section);
      }
    }
    
    function updateOutput() {
      let outputText = '// Kingdom Border Coordinates\n// Copy this to share with Copilot\n\n';
      
      for (const [kingdom, points] of Object.entries(borders)) {
        if (points.length === 0) continue;
        
        outputText += `// ${kingdom.toUpperCase()} BORDER (${points.length} points)\n`;
        outputText += `${kingdom}: [\n`;
        points.forEach((p, i) => {
          outputText += `  { x: ${p.x}, y: ${p.y} }${i < points.length - 1 ? ',' : ''}\n`;
        });
        outputText += `],\n\n`;
        
        // Calculate bounding box
        if (points.length > 0) {
          const minX = Math.min(...points.map(p => p.x));
          const maxX = Math.max(...points.map(p => p.x));
          const minY = Math.min(...points.map(p => p.y));
          const maxY = Math.max(...points.map(p => p.y));
          outputText += `// ${kingdom} bounds: { x1: ${minX}, y1: ${minY}, x2: ${maxX}, y2: ${maxY} }\n`;
          outputText += `// ${kingdom} center: { x: ${((minX + maxX) / 2).toFixed(1)}, y: ${((minY + maxY) / 2).toFixed(1)} }\n\n`;
        }
      }
      
      output.value = outputText;
    }
    
    function undoLast() {
      const kingdom = kingdomSelect.value;
      if (borders[kingdom].length > 0) {
        borders[kingdom].pop();
        render();
      }
    }
    
    function clearCurrent() {
      const kingdom = kingdomSelect.value;
      if (confirm(`Clear all ${kingdom} border points?`)) {
        borders[kingdom] = [];
        render();
      }
    }
    
    function clearAll() {
      if (confirm('Clear ALL border points?')) {
        for (const kingdom in borders) {
          borders[kingdom] = [];
        }
        render();
      }
    }
    
    function copyOutput() {
      output.select();
      document.execCommand('copy');
      alert('Copied to clipboard!');
    }
    
    // Initial render
    render();
  </script>
</body>
</html>
